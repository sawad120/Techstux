kind = "web"
previewPath = "/"
title = "Techstux"
version = "1.0.0"
id = "artifacts/techstux"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19438

[services.development]
run = "pnpm --filter @workspace/techstux run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/techstux", "run", "build" ]
publicDir = "artifacts/techstux/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19438"
BASE_PATH = "/"
